name: Daily Automated Commit

on:
  schedule:
    - cron: '30 2 * * *'   # Runs every day at 02:30 UTC
  workflow_dispatch:         # Allows manual triggering for testing

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit update for 24f1001025@ds.study.iitm.ac.in
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "24f1001025@ds.study.iitm.ac.in"
          echo "Daily update: $(date)" >> daily-log.txt
          git add daily-log.txt
          git commit -m "Automated daily commit - $(date)"
          git push
          
